name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
    # Chỉ chạy pipeline khi code hoặc K8s manifests thay đổi
    paths:
      - 'application/**'
      - 'kubernetes/**'
      - '.github/workflows/**'

jobs:
  # ============================================================
  # JOB 1: CI - Build, Test, Scan, Push Image
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn (Checkout Code)
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './application/package-lock.json'

      - name: Cài đặt thư viện (Install Dependencies)
        working-directory: ./application
        run: npm ci

      # Kiểm tra chất lượng code bằng ESLint (Bắt buộc theo Rubric)
      - name: Kiểm tra chất lượng code (Linting)
        working-directory: ./application
        run: npm run lint

      # Quét bảo mật DevSecOps bằng Trivy (Bắt buộc theo Rubric)
      - name: Quét bảo mật mã nguồn bằng Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './application'
          format: 'table'
          exit-code: '1' # Sẽ báo đỏ (fail) pipeline nếu phát hiện lỗi
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH' # Chỉ bắt lỗi nghiêm trọng

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Lấy mã băm (commit hash) của Git để làm version tag (Không dùng tag 'latest')
      - name: Tạo Version Tag cho Image
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build và Push Docker Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./application
          push: true
          tags: dinhquoccuong286/devops-final-app:${{ steps.vars.outputs.sha_short }}

  # ============================================================
  # JOB 2: CD - Deploy lên STAGING (tự động sau khi CI pass)
  # ============================================================
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging  # GitHub Environment: staging

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cấu hình AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Lấy file cấu hình Kubeconfig của EKS
        run: aws eks update-kubeconfig --region ap-southeast-2 --name devops-final-cluster

      - name: Lấy Version Tag hiện tại
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Triển khai lên Staging
        run: |
          # Tạo namespace staging nếu chưa có
          kubectl apply -f kubernetes/staging/namespace.yaml

          # Deploy MongoDB trước (database phải sẵn sàng trước app)
          kubectl apply -f kubernetes/mongodb-pvc.yaml -n staging
          kubectl apply -f kubernetes/mongodb-deployment.yaml -n staging
          kubectl apply -f kubernetes/mongodb-service.yaml -n staging

          # Thay thế placeholder bằng image tag mới
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ steps.vars.outputs.sha_short }}/g" kubernetes/staging/deployment.yaml

          # Deploy app lên staging
          kubectl apply -f kubernetes/staging/deployment.yaml
          kubectl apply -f kubernetes/staging/service.yaml

      - name: Kiểm tra Staging đã sẵn sàng
        run: |
          echo "⏳ Đang chờ Staging deployment ready..."
          kubectl rollout status deployment/devops-final-deployment -n staging --timeout=120s
          echo "✅ Staging deployment ready!"

  # ============================================================
  # JOB 3: CD - Deploy lên PRODUCTION (cần Manual Approval)
  # ============================================================
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production  # GitHub Environment: production (cần approve thủ công)

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cấu hình AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Lấy file cấu hình Kubeconfig của EKS
        run: aws eks update-kubeconfig --region ap-southeast-2 --name devops-final-cluster

      - name: Lấy Version Tag hiện tại
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Triển khai lên Production
        run: |
          # Tạo namespace production nếu chưa có
          kubectl apply -f kubernetes/production/namespace.yaml

          # Deploy MongoDB trước (database phải sẵn sàng trước app)
          kubectl apply -f kubernetes/mongodb-pvc.yaml
          kubectl apply -f kubernetes/mongodb-deployment.yaml
          kubectl apply -f kubernetes/mongodb-service.yaml

          # Thay thế placeholder bằng image tag mới
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ steps.vars.outputs.sha_short }}/g" kubernetes/deployment.yaml

          # Deploy app lên production
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml

      # ============================================================
      # AUTOMATED ROLLBACK: Nếu health check fail → tự động rollback
      # ============================================================
      - name: Health Check và Auto-Rollback
        run: |
          echo "⏳ Đang kiểm tra Production deployment..."

          # Chờ deployment hoàn thành (timeout 120 giây)
          if kubectl rollout status deployment/devops-final-deployment -n production --timeout=120s; then
            echo "✅ Production deployment thành công!"
          else
            echo "❌ Production deployment THẤT BẠI! Đang rollback..."

            # Tự động rollback về phiên bản trước
            kubectl rollout undo deployment/devops-final-deployment -n production

            # Chờ rollback hoàn thành
            kubectl rollout status deployment/devops-final-deployment -n production --timeout=60s

            echo "🔄 Đã rollback thành công về phiên bản trước!"

            # Fail pipeline để thông báo lỗi
            exit 1
          fi
