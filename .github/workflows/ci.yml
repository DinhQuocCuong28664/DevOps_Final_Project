name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
    # Chỉ chạy pipeline khi code hoặc K8s manifests thay đổi
    paths:
      - 'application/**'
      - 'kubernetes/**'
      - '.github/workflows/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn (Checkout Code)
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './application/package-lock.json'

      - name: Cài đặt thư viện (Install Dependencies)
        working-directory: ./application
        run: npm ci

      # Kiểm tra chất lượng code bằng ESLint (Bắt buộc theo Rubric)
      - name: Kiểm tra chất lượng code (Linting)
        working-directory: ./application
        run: npm run lint

      # Quét bảo mật DevSecOps bằng Trivy (Bắt buộc theo Rubric)
      - name: Quét bảo mật mã nguồn bằng Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './application'
          format: 'table'
          exit-code: '1' # Sẽ báo đỏ (fail) pipeline nếu phát hiện lỗi
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH' # Chỉ bắt lỗi nghiêm trọng

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Lấy mã băm (commit hash) của Git để làm version tag (Không dùng tag 'latest')
      - name: Tạo Version Tag cho Image
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build và Push Docker Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./application
          push: true
          tags: dinhquoccuong286/devops-final-app:${{ steps.vars.outputs.sha_short }}

  # ============================================================
  # JOB 2: CD - Triển khai tự động lên Amazon EKS
  # ============================================================
  deploy-to-eks:
    needs: build-and-push # BẮT BUỘC: CD chỉ chạy khi CI (build image) đã thành công
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cấu hình AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Lấy file cấu hình Kubeconfig của EKS
        run: aws eks update-kubeconfig --region ap-southeast-2 --name devops-final-cluster

      - name: Lấy Version Tag hiện tại
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Triển khai lên Kubernetes (Deploy to EKS)
        run: |
          # Dùng lệnh sed để tìm chữ IMAGE_TAG_PLACEHOLDER và thay bằng tag image mới nhất
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ steps.vars.outputs.sha_short }}/g" kubernetes/deployment.yaml

          # Áp dụng bản vẽ lên cụm K8s
          kubectl apply -f kubernetes/
