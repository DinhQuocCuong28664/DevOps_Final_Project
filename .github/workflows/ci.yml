name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
    # Only run pipeline when application code or K8s manifests change
    paths:
      - 'application/**'
      - 'kubernetes/**'
      - '.github/workflows/**'

jobs:
  # ============================================================
  # JOB 1: CI - Build, Test, Scan, Push Image
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './application/package-lock.json'

      - name: Install Dependencies
        working-directory: ./application
        run: npm ci

      # Code quality check via ESLint
      - name: Lint Code
        working-directory: ./application
        run: npm run lint

      # Security scan via Trivy (DevSecOps)
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './application'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Use Git commit SHA as image tag (never use 'latest')
      - name: Generate Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./application
          push: true
          tags: dinhquoccuong286/devops-final-app:${{ steps.vars.outputs.sha_short }}

  # ============================================================
  # JOB 2: CD - Deploy to STAGING (auto, after CI passes)
  # ============================================================
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Connect kubectl to EKS
        run: aws eks update-kubeconfig --region ap-southeast-2 --name devops-final-cluster

      - name: Generate Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to Staging
        run: |
          # Create staging namespace if not exists (idempotent)
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

          # Note: Staging reuses production MongoDB (cross-namespace DNS)
          # mongodb-service.production.svc.cluster.local

          # Replace image tag placeholder with current commit SHA
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ steps.vars.outputs.sha_short }}/g" kubernetes/staging/deployment.yaml

          # Deploy staging app
          kubectl apply -f kubernetes/staging/deployment.yaml
          kubectl apply -f kubernetes/staging/service.yaml

      - name: Wait for Staging Rollout
        run: |
          echo "Waiting for staging deployment to be ready..."
          kubectl rollout status deployment/devops-final-deployment -n staging --timeout=120s
          echo "[OK] Staging deployment ready!"

  # ============================================================
  # JOB 3: CD - Deploy to PRODUCTION (requires Manual Approval)
  # ============================================================
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production  # GitHub Environment with required reviewer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Connect kubectl to EKS
        run: aws eks update-kubeconfig --region ap-southeast-2 --name devops-final-cluster

      - name: Generate Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to Production
        run: |
          # Create production namespace if not exists (idempotent)
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

          # Ensure MongoDB is deployed (idempotent)
          kubectl apply -f kubernetes/mongodb-pvc.yaml
          kubectl apply -f kubernetes/mongodb-deployment.yaml
          kubectl apply -f kubernetes/mongodb-service.yaml

          # Replace image tag placeholder with current commit SHA
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ steps.vars.outputs.sha_short }}/g" kubernetes/deployment.yaml

          # Deploy production app
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml

      # ============================================================
      # AUTOMATED ROLLBACK: if health check fails, auto-rollback
      # ============================================================
      - name: Health Check and Auto-Rollback
        run: |
          echo "Waiting for production deployment to complete..."

          if kubectl rollout status deployment/devops-final-deployment -n production --timeout=120s; then
            echo "[OK] Production deployment successful!"
          else
            echo "[FAIL] Production deployment failed! Rolling back..."

            # Auto-rollback to previous version
            kubectl rollout undo deployment/devops-final-deployment -n production

            # Wait for rollback to complete
            kubectl rollout status deployment/devops-final-deployment -n production --timeout=60s

            echo "[OK] Rollback to previous version completed."

            # Fail the pipeline to trigger notification
            exit 1
          fi
