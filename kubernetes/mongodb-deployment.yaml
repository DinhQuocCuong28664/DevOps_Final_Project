# MongoDB Deployment for EKS
# Runs a single replica of MongoDB with persistent storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: production
  labels:
    app: mongodb
spec:
  replicas: 1  # MongoDB standalone (sufficient for the project)
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate  # No RollingUpdate because EBS can only mount to 1 pod
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7  # MongoDB 7 (latest stable version)
        ports:
        - containerPort: 27017
        # Resource limits to prevent consuming all worker node resources
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Mount volume so data persists across pod restarts
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: mongodb-pvc
