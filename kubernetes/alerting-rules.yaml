apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-final-alerts
  namespace: monitoring
  labels:
    release: monitoring-stack  # REQUIRED: Must match the Helm release name
spec:
  groups:
  - name: devops-final.rules
    rules:
    # =============================================
    # Alert 1: Pod is crash-looping (CrashLoopBackOff)
    # =============================================
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="production"}[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is crash-looping!"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 0 times in the last 5 minutes."

    # =============================================
    # Alert 2: CPU usage too high (>80%)
    # =============================================
    - alert: HighCPUUsage
      expr: |
        (sum(rate(container_cpu_usage_seconds_total{namespace="production", container!=""}[5m])) by (pod)
        /
        sum(kube_pod_container_resource_limits{namespace="production", resource="cpu"}) by (pod))
        * 100 > 80
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is using >80% CPU!"
        description: "CPU usage for pod {{ $labels.pod }} has exceeded 80% for 3 consecutive minutes."

    # =============================================
    # Alert 3: Memory usage too high (>85%)
    # =============================================
    - alert: HighMemoryUsage
      expr: |
        (sum(container_memory_working_set_bytes{namespace="production", container!=""}) by (pod)
        /
        sum(kube_pod_container_resource_limits{namespace="production", resource="memory"}) by (pod))
        * 100 > 85
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is using >85% RAM!"
        description: "Memory usage for pod {{ $labels.pod }} has exceeded 85% for 3 consecutive minutes."

    # =============================================
    # Alert 4: Ready pods fewer than desired replicas
    # =============================================
    - alert: DeploymentReplicasMismatch
      expr: kube_deployment_status_replicas_available{namespace="production", deployment="devops-final-deployment"} < kube_deployment_spec_replicas{namespace="production", deployment="devops-final-deployment"}
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Deployment devops-final-deployment has missing pods!"
        description: "The number of running pods ({{ $value }}) is less than the desired replica count. The system may be experiencing issues."
