apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-final-deployment
  namespace: production
  labels:
    app: nodejs-web
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-web
  # Rolling Update strategy: never take down old pods before new ones are ready
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Always keep enough pods running (zero-downtime)
      maxSurge: 1          # Create at most 1 new pod at a time
  template:
    metadata:
      labels:
        app: nodejs-web
        environment: production
    spec:
      containers:
      - name: nodejs-container
        # CD pipeline replaces IMAGE_TAG_PLACEHOLDER with the Git commit SHA
        # NEVER use 'latest' tag — must use explicit version tags per STANDARD RULE
        image: dinhquoccuong286/devops-final-app:IMAGE_TAG_PLACEHOLDER
        ports:
        - containerPort: 3000
        # Environment variables for S3 Image Upload
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/products_db"
        - name: S3_BUCKET_NAME
          value: "devops-final-uploads-dqc28664"
        - name: AWS_REGION
          value: "ap-southeast-2"
        # Readiness Probe: K8s checks if the pod is ready before routing traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        # Liveness Probe: K8s restarts the pod if the app becomes unresponsive
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"