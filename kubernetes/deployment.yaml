apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-final-deployment
  namespace: production
  labels:
    app: nodejs-web
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-web
  # Chiến lược Rolling Update: không bao giờ hạ pod cũ trước khi pod mới ready
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Luôn giữ đủ pod chạy (zero-downtime)
      maxSurge: 1          # Tạo tối đa 1 pod mới cùng lúc
  template:
    metadata:
      labels:
        app: nodejs-web
        environment: production
    spec:
      containers:
      - name: nodejs-container
        # CD pipeline sẽ tự động thay IMAGE_TAG_PLACEHOLDER bằng Git SHA
        image: dinhquoccuong286/devops-final-app:IMAGE_TAG_PLACEHOLDER
        ports:
        - containerPort: 3000
        # Biến môi trường cho S3 Image Upload
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/products_db"
        - name: S3_BUCKET_NAME
          value: "devops-final-uploads-dqc28664"
        - name: AWS_REGION
          value: "ap-southeast-2"
        # Readiness Probe: K8s kiểm tra pod sẵn sàng trước khi route traffic vào
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"