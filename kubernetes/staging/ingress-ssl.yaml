apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-final-staging-ingress
  namespace: staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - staging.moteo.fun
    secretName: staging-moteo-tls-secret
  rules:
  - host: staging.moteo.fun
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-final-service
            port:
              number: 80
