apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-final-deployment
  namespace: staging
  labels:
    app: nodejs-web
    environment: staging
spec:
  replicas: 1  # Staging chỉ cần 1 replica (tiết kiệm tài nguyên)
  selector:
    matchLabels:
      app: nodejs-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nodejs-web
        environment: staging
    spec:
      containers:
      - name: nodejs-container
        image: dinhquoccuong286/devops-final-app:IMAGE_TAG_PLACEHOLDER
        ports:
        - containerPort: 3000
        # Biến môi trường cho S3 Image Upload
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service.staging:27017/products_db"
        - name: S3_BUCKET_NAME
          value: "devops-final-uploads-dqc28664"
        - name: AWS_REGION
          value: "ap-southeast-2"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        # Liveness Probe: K8s restart pod nếu app bị treo
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
