apiVersion: v1
kind: Service
metadata:
  name: devops-final-service
  namespace: production
  labels:
    app: devops-final-app        # Matches ServiceMonitor selector
spec:
  type: ClusterIP
  selector:
    app: nodejs-web
  ports:
    - name: http                 # Port name - ServiceMonitor uses this to scrape
      protocol: TCP
      port: 80                   # Internal port (traffic routed through Ingress)
      targetPort: 3000           # Maps to container port 3000