apiVersion: v1
kind: Service
metadata:
  name: devops-final-service
  namespace: production
  labels:
    app: devops-final-app        # Khớp với ServiceMonitor selector
spec:
  type: ClusterIP
  selector:
    app: nodejs-web
  ports:
    - name: http                 # Tên port — ServiceMonitor dùng tên này để scrape
      protocol: TCP
      port: 80                   # Port nội bộ (traffic đi qua Ingress)
      targetPort: 3000           # Trỏ vào port 3000 của container ứng dụng