# ============================================================
# Loki Stack Helm Values
# Chart: grafana/loki-stack
# Namespace: monitoring (same namespace as kube-prometheus-stack)
# Includes: Loki + Promtail (collects logs from all pods)
# ============================================================

loki:
  enabled: true
  # Single-binary mode (suitable for course project)
  isDefault: false
  # Retention: keep logs for 7 days
  config:
    limits_config:
      retention_period: 168h
    chunk_store_config:
      max_look_back_period: 168h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 168h

promtail:
  enabled: true
  config:
    # Collect logs from all namespaces (production, staging, monitoring, ...)
    snippets:
      pipelineStages:
        - cri: {}
      scrapeConfigs: |
        - job_name: kubernetes-pods
          pipeline_stages:
            - cri: {}
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                - __meta_kubernetes_pod_controller_name
              regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
              action: replace
              target_label: __tmp_controller_name
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
                - __meta_kubernetes_pod_label_app
                - __tmp_controller_name
                - __meta_kubernetes_pod_name
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: app
            - source_labels:
                - __meta_kubernetes_pod_node_name
              action: replace
              target_label: node_name
            - source_labels:
                - __meta_kubernetes_namespace
              action: replace
              target_label: namespace
            - action: replace
              replacement: $1
              separator: /
              source_labels:
                - namespace
                - app
              target_label: job
            - source_labels:
                - __meta_kubernetes_pod_name
              action: replace
              target_label: pod
            - source_labels:
                - __meta_kubernetes_pod_container_name
              action: replace
              target_label: container
            - source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              replacement: /var/log/pods/*$1/*.log
              separator: /
              target_label: __path__
            - source_labels:
                - __meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash
                - __meta_kubernetes_pod_annotation_kubernetes_io_config_mirror
                - __meta_kubernetes_pod_label_component
              separator: ;
              regex: true;([^;]+);(.*)
              target_label: __path__
              replacement: /var/log/pods/*$1*/*/*.log

# Grafana: DO NOT deploy separately - reuse Grafana from kube-prometheus-stack
grafana:
  enabled: false

# Fluent Bit: disabled (using Promtail instead)
fluent-bit:
  enabled: false

# filebeat: disabled
filebeat:
  enabled: false

# logstash: disabled
logstash:
  enabled: false
