# PersistentVolumeClaim for MongoDB
# Uses EBS gp2 (default EKS StorageClass)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: production
spec:
  accessModes:
    - ReadWriteOnce      # EBS only supports single-node mount
  storageClassName: gp2  # gp2 is the default StorageClass on EKS
  resources:
    requests:
      storage: 1Gi       # 1GB sufficient for the project, within Free Tier
