# PersistentVolumeClaim for MongoDB
# Uses EBS gp3 (within AWS Free Tier 30GB)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: production
spec:
  accessModes:
    - ReadWriteOnce      # EBS only supports single-node mount
  storageClassName: gp3  # gp3 is more cost-effective than gp2
  resources:
    requests:
      storage: 1Gi       # 1GB sufficient for the project, within Free Tier
