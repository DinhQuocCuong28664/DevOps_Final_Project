# ============================================================
# prometheus-scrape.yaml
# Configures Prometheus (kube-prometheus-stack) to automatically
# scrape the /metrics endpoint from application pods.
#
# Target: all pods with label app=devops-final-app
# Namespace: production
# ============================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-final-app-metrics
  namespace: monitoring          # Must be in the same namespace as Prometheus
  labels:
    # This label must match the serviceMonitorSelector of kube-prometheus-stack
    release: monitoring-stack
spec:
  namespaceSelector:
    matchNames:
      - production               # Scrape pods in the production namespace
  selector:
    matchLabels:
      app: devops-final-app      # Matches the label in service.yaml
  endpoints:
    - port: http                 # Port name from service.yaml (port: 3000)
      path: /metrics             # Endpoint exposed by prom-client
      interval: 15s              # Scrape every 15 seconds
      scrapeTimeout: 10s
