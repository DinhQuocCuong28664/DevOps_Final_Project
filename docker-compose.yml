# Docker Compose for local development
# Run:    docker-compose up --build
# Access: http://localhost:3000

version: '3.8'

services:
  # Node.js Application
  app:
    build: ./application
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/products_db
      # S3_BUCKET_NAME not set -> app uses local disk upload
    depends_on:
      - mongo
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"   # Exposed for MongoDB Compass access
    volumes:
      - mongo-data:/data/db   # Persist data across container restarts
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
