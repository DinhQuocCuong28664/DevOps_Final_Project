# Docker Compose cho phát triển local
# Chạy: docker-compose up --build
# Truy cập: http://localhost:3000

version: '3.8'

services:
  # Ứng dụng Node.js
  app:
    build: ./application
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/products_db
      # Không set S3_BUCKET_NAME → app dùng local disk upload
    depends_on:
      - mongo
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"   # Expose để có thể dùng MongoDB Compass xem data
    volumes:
      - mongo-data:/data/db   # Persist data khi container restart
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
